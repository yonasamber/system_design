apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  type: ClusterIP # ✅ 'IP' is capitalized, case-sensitive
  selector:
    app: rabbitmq
  ports: # ✅ lowercase 'ports'
    - name: http
      protocol: TCP
      port: 15672
      targetPort: 15672
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
